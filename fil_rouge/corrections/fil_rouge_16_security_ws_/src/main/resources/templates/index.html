<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>Titre</title>
	<link rel="stylesheet" th:href="@{/css/bootstrap.css}" />
	<link rel="stylesheet" href="//netdna.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap.min.css" />
	<link rel="stylesheet" href="//netdna.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap-theme.min.css" />
</head>

<body>
	<div class="container">
		<div class="row">
			<p class="lead">


				<span th:text="#{app.welcome}" th:remove="tag"></span>

				 <span sec:authentication="name"/>
				<br />
				<span th:txt="#{app.date}" th:remove="tag"></span>
				<span th:text="${#temporals.format(dateActuelle, 'dd-MM-yyyy HH:mm')}">[dateActuelle]</span>
			</p>
		</div>
		<div class="row text-center text-lg-left">
			<div class="col-lg-3 col-md-4 col-6">
				<span sec:authorize="hasRole('ADMIN')">
					
				<a href="listeDuplicatas">
					
					
							<span th:text="#{app.display.duplicatas}" th:remove="tag"></span>
					

				</a>
				</span>
			</div>
			
			<br />

			<div class="col-lg-3 col-md-4 col-6">
				<div><a href="genererDuplicata">
					
					<span th:text="#{app.create.duplicata}" th:remove="tag"></span>
				</a></div>
			</div>
		</div>
	</div>

	<script th:href="@{/js/bootstrap.js}"></script>
</body>

</html>
