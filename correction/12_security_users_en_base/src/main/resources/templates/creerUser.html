<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<title>Générer Duplicata</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<link rel="stylesheet" th:href="@{/css/bootstrap.css}" />
	<link rel="stylesheet" href="//netdna.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap.min.css" />
	<link rel="stylesheet" href="//netdna.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap-theme.min.css" />
</head>

<body>
	<div class="container">
		<div class="row">
			<p class="lead">
				Créer un compte
			</p>
		</div>
		<div class="row">
			<p style="background-color:red" th:if="${userAlreadyExists}"> 
				Un compte existe déjà pour ce numero fiscal !
						</p>
			<div class="col-sm-3"></div>
			<div class="col-sm-6">
				<form  method="post" th:action="@{/creerUser}" th:object="${formulaireUser}"> 
					<div class="form-group">
						<p>
							<label for="description"> Numero fiscal: </label>
							<input type="text" th:field="*{numeroFiscal}" />

						</p>
						<p style="background-color:red" th:if="${#fields.hasErrors('numeroFiscal')}" th:errors="*{numeroFiscal}"> 
						</p>
					</div>
					<div class="form-group">
						<p>
							<label for="description"> Login: </label>
							<input type="text" th:field="*{username}"/>

						</p>
						<p style="background-color:red" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"> 
						</p>
					</div>
					
					<div class="form-group">
						<p>
							<label for="description"> Mot de passe: </label>
							<input type="text" th:field="*{password}"/>

						</p>
						<p style="background-color:red" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"> 
						</p>
					</div>

					<p><input type="submit" value="Créer" class="btn btn-default" /></p>
				</form>
			</div>
		</div>
	</div>
	<br />
		<div><a href="/login">Se loguer</a></div>
	<script th:href="@{/js/bootstrap.js}"></script>
</body>

</html>
