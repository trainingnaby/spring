<!DOCTYPE HTML>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<title>Générer Duplicata</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<link rel="stylesheet" th:href="@{/css/bootstrap.css}" />
	<link rel="stylesheet" href="//netdna.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap.min.css" />
	<link rel="stylesheet" href="//netdna.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap-theme.min.css" />
</head>

<body>
	<div class="container">
		<div th:if="${user != null}" class="row">
			<div class="col-sm-3"></div>
			<div class="col-sm-6">
				Compte créé !
			</div>
		</div>
		
		<div class="row">
			<p class="lead">
				Se connecter
			</p>
		</div>
		<div th:if="${param.error}">
			Login et/ou mot de passe invalides.</div>
		<div th:if="${param.logout}">
			Vous avez été deconnecté.</div>
		<div class="row">
			<div class="col-sm-3"></div>
			<div class="col-sm-6">
				<form  th:action="@{/login}" method="post"> 
					<div class="form-group">
						<p>
							<label for="description"> Login: </label>
							<input type="text" name="username"> 

						</p>
					</div>
					<div class="form-group">
						<p>
							<label for="description"> Mot de passe: </label>
							<input type="password" name="password"> 

						</p>
					</div>

					<p><input type="submit" value="connexion" class="btn btn-default" /></p>
				</form>
			</div>
		</div>
	</div>
	<br />
		<div><a href="/creerUser">Créer compte</a></div>
	<script th:href="@{/js/bootstrap.js}"></script>
</body>

</html>
